version: '3.8'

services:
  frontend:
    build:
      context: ./frontend/hackathon
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend/Odoo
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    env_file:
      - ./backend/Odoo/.env
